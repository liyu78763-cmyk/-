name: Cross-border DingTalk Daily

on:
  schedule:
    # Beijing weekday 10:00 with fallback attempts through 10:30.
    # Beijing time is UTC+8 year-round, so 10:00-10:30 BJT = 02:00-02:30 UTC.
    # The run-key below prevents duplicate sends when more than one attempt runs.
    - cron: "0,5,10,15,20,25,30 2 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = preview only, false = send DingTalk"
        required: true
        type: boolean
        default: false

concurrency:
  group: crossborder-dingtalk-daily-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      LOG_LEVEL: INFO
      DRY_RUN_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Check Beijing weekday schedule
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "RUN_BRIEFING=true" >> "$GITHUB_ENV"
            echo "Manual workflow run; continuing."
            exit 0
          fi

          BEIJING_TIME="$(TZ=Asia/Shanghai date +'%H:%M')"
          BEIJING_DAY="$(TZ=Asia/Shanghai date +'%u')"
          BEIJING_DATE="$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          echo "Asia/Shanghai time: ${BEIJING_TIME}, weekday: ${BEIJING_DAY}"

          if [[ "${BEIJING_DAY}" -ge 1 && "${BEIJING_DAY}" -le 5 ]]; then
            echo "RUN_BRIEFING=true" >> "$GITHUB_ENV"
            echo "BRIEFING_RUN_KEY=bjt-${BEIJING_DATE}" >> "$GITHUB_ENV"
          else
            echo "RUN_BRIEFING=false" >> "$GITHUB_ENV"
            echo "Not a Beijing weekday; skipping send."
          fi

      - name: Checkout
        if: env.RUN_BRIEFING == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.RUN_BRIEFING == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: env.RUN_BRIEFING == 'true'
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Restore history cache
        if: env.RUN_BRIEFING == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/history.sqlite
          key: history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            history-${{ github.ref_name }}-

      - name: Run code checks
        if: env.RUN_BRIEFING == 'true'
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy src
          python -m pytest

      - name: Generate and send daily briefing
        if: env.RUN_BRIEFING == 'true'
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "${DRY_RUN_INPUT}" == "true" ]]; then
            EXTRA_ARGS+=("--dry-run")
          fi
          if [[ -n "${BRIEFING_RUN_KEY:-}" ]]; then
            EXTRA_ARGS+=("--run-key" "${BRIEFING_RUN_KEY}")
          fi
          python -m crossborder_daily "${EXTRA_ARGS[@]}" --hours 24 --max-items 10 --max-news-age-days 7 --amz123-items 5 --min-high-value-items 0 --output data/latest_report.md

      - name: Upload generated report
        if: always() && env.RUN_BRIEFING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crossborder-daily-report-${{ github.run_id }}
          path: |
            data/latest_report.md
            data/history.sqlite
          if-no-files-found: warn
          retention-days: 14

      - name: Save history cache
        if: always() && env.RUN_BRIEFING == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/history.sqlite
          key: history-${{ github.ref_name }}-${{ github.run_id }}
