name: Cross-border DingTalk Daily

on:
  schedule:
    # Amazon US/Pacific weekday 00:00 hour.
    # PDT midnight hour = UTC 07:00-07:59; PST midnight hour = UTC 08:00-08:59.
    # The guard step below lets only the real America/Los_Angeles midnight hour continue,
    # and the run-key prevents duplicate sends when fallback attempts also run.
    - cron: "0,10,20,30,40,50 7,8 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = preview only, false = send DingTalk"
        required: true
        type: boolean
        default: false

concurrency:
  group: crossborder-dingtalk-daily-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
      AI_MODEL: ${{ secrets.AI_MODEL }}
      LOG_LEVEL: INFO
      DRY_RUN_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Check Pacific midnight schedule
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "RUN_BRIEFING=true" >> "$GITHUB_ENV"
            echo "Manual workflow run; continuing."
            exit 0
          fi

          PACIFIC_HOUR="$(TZ=America/Los_Angeles date +'%H')"
          PACIFIC_MINUTE="$(TZ=America/Los_Angeles date +'%M')"
          PACIFIC_DAY="$(TZ=America/Los_Angeles date +'%u')"
          PACIFIC_DATE="$(TZ=America/Los_Angeles date +'%Y-%m-%d')"
          echo "America/Los_Angeles time: ${PACIFIC_HOUR}:${PACIFIC_MINUTE}, weekday: ${PACIFIC_DAY}"

          if [[ "${PACIFIC_HOUR}" == "00" && "${PACIFIC_DAY}" -ge 1 && "${PACIFIC_DAY}" -le 5 ]]; then
            echo "RUN_BRIEFING=true" >> "$GITHUB_ENV"
            echo "BRIEFING_RUN_KEY=amazon-us-${PACIFIC_DATE}" >> "$GITHUB_ENV"
          else
            echo "RUN_BRIEFING=false" >> "$GITHUB_ENV"
            echo "Not Pacific weekday midnight hour; skipping send."
          fi

      - name: Checkout
        if: env.RUN_BRIEFING == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: env.RUN_BRIEFING == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: env.RUN_BRIEFING == 'true'
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Restore history cache
        if: env.RUN_BRIEFING == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/history.sqlite
          key: history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            history-${{ github.ref_name }}-

      - name: Run code checks
        if: env.RUN_BRIEFING == 'true'
        run: |
          python -m ruff format --check .
          python -m ruff check .
          python -m mypy src
          python -m pytest

      - name: Generate and send daily briefing
        if: env.RUN_BRIEFING == 'true'
        shell: bash
        run: |
          set -euo pipefail
          EXTRA_ARGS=()
          if [[ "${DRY_RUN_INPUT}" == "true" ]]; then
            EXTRA_ARGS+=("--dry-run")
          fi
          if [[ -n "${BRIEFING_RUN_KEY:-}" ]]; then
            EXTRA_ARGS+=("--run-key" "${BRIEFING_RUN_KEY}")
          fi
          python -m crossborder_daily "${EXTRA_ARGS[@]}" --hours 24 --max-items 10 --max-news-age-days 7 --amz123-items 5 --min-high-value-items 0 --output data/latest_report.md

      - name: Upload generated report
        if: always() && env.RUN_BRIEFING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crossborder-daily-report-${{ github.run_id }}
          path: |
            data/latest_report.md
            data/history.sqlite
          if-no-files-found: warn
          retention-days: 14

      - name: Save history cache
        if: always() && env.RUN_BRIEFING == 'true'
        uses: actions/cache/save@v4
        with:
          path: data/history.sqlite
          key: history-${{ github.ref_name }}-${{ github.run_id }}
