gdelt_queries:
  - name: amazon_policy
    query: '"Amazon" ("Seller Central" OR "seller policy" OR "account health" OR "listing compliance")'
    category: amazon_platform
  - name: amazon_fba
    query: '"Amazon" ("FBA fee" OR "fulfillment fee" OR "storage fee" OR "inbound placement" OR "returns policy")'
    category: logistics
  - name: amazon_ads
    query: '"Amazon Ads" OR "Sponsored Products" OR "Sponsored Brands" OR "Amazon Marketing Cloud" OR "Amazon DSP"'
    category: ads_traffic
  - name: us_trade_china
    query: '("USTR" OR "CBP" OR "Federal Register" OR tariff OR customs) (China OR ecommerce OR import)'
    category: policy_compliance
  - name: product_safety
    query: '("CPSC" OR "FDA" OR "FTC") ("recall" OR "product safety" OR "import alert" OR ecommerce)'
    category: policy_compliance
  - name: logistics
    query: '("USPS" OR "UPS" OR "FedEx" OR "Port of Los Angeles" OR "Port of Long Beach") (surcharge OR disruption OR shipping OR freight)'
    category: logistics
  - name: marketplace_competitors
    query: '("Walmart Marketplace" OR "TikTok Shop US" OR "Temu" OR "eBay") ("seller" OR marketplace OR policy OR fee)'
    category: market_platform

